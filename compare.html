    .nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
    .nav-links a { font-size: 13px; font-weight: 500; color: var(--muted); padding: 6px 12px; border-radius: 6px; transition: color 0.15s, background 0.15s; }
    .nav-links a:hover { color: var(--text); background: var(--bg3); }
    .nav-cta { background: var(--green) !important; color: #000 !important; font-weight: 700 !important; }

    .hamburger {
      display: none; flex-direction: column; justify-content: center; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px; z-index: 101;
    }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: transform 0.2s, opacity 0.2s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 88px 32px 96px; }

    .page-header { margin-bottom: 48px; }
    .page-header h1 { font-size: clamp(32px, 5vw, 48px); font-weight: 800; letter-spacing: -1.5px; margin-bottom: 10px; }
    .page-header p { color: var(--muted); font-size: 15px; }

    /* SELECTOR */
    .selector-row {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 16px; align-items: center; margin-bottom: 48px;
    }
    .vs-badge {
      font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 700;
      color: var(--faint); background: var(--bg3); border: 1px solid var(--border);
      padding: 8px 14px; border-radius: 8px; text-align: center;
    }
    .tool-select-wrap { position: relative; }
    .tool-select-wrap select {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 40px 14px 16px;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 600;
      color: var(--text); outline: none; cursor: pointer; appearance: none;
      transition: border-color 0.2s;
    }
    .tool-select-wrap select:focus { border-color: rgba(0,229,160,0.4); }
    .tool-select-wrap::after {
      content: '▾'; position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--faint); pointer-events: none; font-size: 14px;
    }

    /* COMPARE BTN */
    .compare-btn {
      display: block; margin: 0 auto 48px;
      background: var(--green); color: #000; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px; font-weight: 700; padding: 14px 36px; border-radius: 8px;
      border: none; cursor: pointer; transition: opacity 0.15s, transform 0.15s;
    }
    .compare-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .compare-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* RESULTS TABLE */
    #compare-result { display: none; }
    #compare-result.visible { display: block; }

    .compare-header {
      display: grid; grid-template-columns: 200px 1fr 1fr;
      gap: 1px; background: var(--border); border-radius: 12px 12px 0 0; overflow: hidden;
      margin-bottom: 1px;
    }
    .compare-header-cell {
      background: var(--bg3); padding: 20px 24px;
    }
    .compare-header-cell.label-col { background: var(--bg2); }
    .tool-header-name { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .tool-header-cat { font-size: 12px; color: var(--green); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

    .compare-table { width: 100%; border-radius: 0 0 12px 12px; overflow: hidden; border: 1px solid var(--border); border-top: none; }
    .compare-row {
      display: grid; grid-template-columns: 200px 1fr 1fr;
      border-top: 1px solid var(--border);
    }

    .compare-cell.label { font-weight: 600; color: var(--muted); font-size: 13px; background: var(--bg3) !important; }
    .check { color: #4ade80; font-size: 16px; }
    .cross { color: var(--faint); font-size: 16px; }
    .partial { color: #fbbf24; font-size: 13px; font-weight: 500; }

    /* WINNER BADGE */

    .winner-cta { background: var(--green); color: #000; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px; font-weight: 700; padding: 10px 20px; border-radius: 7px; border: none; cursor: pointer; white-space: nowrap; }

  </style>
</head>

const ROWS = [
  { key: "category",         label: "Category" },
  { key: "pricing",          label: "Pricing" },
  { key: "free_plan",        label: "Free plan", type: "bool" },
  { key: "free_trial",       label: "Free trial", type: "bool" },
  { key: "ai_powered",       label: "AI-powered", type: "bool" },
  { key: "templates",        label: "Templates", type: "bool" },
  { key: "team_collab",      label: "Team collaboration", type: "bool" },
  { key: "mobile_app",       label: "Mobile app", type: "bool" },
  { key: "api_access",       label: "API access", type: "bool" },
  { key: "integrations",     label: "Integrations" },
  { key: "customer_support", label: "Customer support" },
  { key: "ease_of_use",      label: "Ease of use" },
  { key: "output_quality",   label: "Output quality" },
  { key: "best_for",         label: "Best for" },
];

function boolCell(val) {
  return val
    ? '<span class="check">✓</span>'
    : '<span class="cross">—</span>';
}

function runCompare() {
  const keyA = document.getElementById('tool-a').value;
  const keyB = document.getElementById('tool-b').value;
  if (!keyA || !keyB) { alert('Please select two tools to compare.'); return; }
  if (keyA === keyB) { alert('Please select two different tools.'); return; }

  const a = TOOLS[keyA];
  const b = TOOLS[keyB];

  // Header
  document.getElementById('compare-header').innerHTML = `
    <div class="compare-header-cell label-col"></div>
    <div class="compare-header-cell">
      <div class="tool-header-cat">${a.category}</div>
      <div class="tool-header-name">${a.name}</div>
    </div>
    <div class="compare-header-cell">
      <div class="tool-header-cat">${b.category}</div>
      <div class="tool-header-name">${b.name}</div>
    </div>`;

  // Rows
  let rows = '';
  ROWS.forEach(row => {
    const valA = row.type === 'bool' ? boolCell(a[row.key]) : (a[row.key] || '—');
    const valB = row.type === 'bool' ? boolCell(b[row.key]) : (b[row.key] || '—');
    rows += `
      <div class="compare-row">
        <div class="compare-cell label">${row.label}</div>
        <div class="compare-cell">${valA}</div>
        <div class="compare-cell">${valB}</div>
      </div>`;
  });
  document.getElementById('compare-table').innerHTML = rows;

  // Winner logic — simple score
  let scoreA = 0, scoreB = 0;
  ['free_plan','free_trial','ai_powered','templates','team_collab','mobile_app','api_access'].forEach(k => {
    if (a[k]) scoreA++; if (b[k]) scoreB++;
  });
  const winner = scoreA >= scoreB ? a : b;
  const loser = scoreA >= scoreB ? b : a;

  document.getElementById('winner-row').innerHTML = `
    <div>
      <div class="winner-label">Our pick</div>
      <div class="winner-name">${winner.name}</div>
      <div class="winner-reason">${winner.name} edges out ${loser.name} with more features included at its price point, particularly for small business use cases. That said, ${loser.name} may suit you better depending on your specific needs — see the full review for details.</div>
    </div>
    <a href="${winner.affiliate_link}" target="_blank" rel="sponsored noopener">
      <button class="winner-cta">Try ${winner.name} →</button>
    </a>`;

  const result = document.getElementById('compare-result');
  result.classList.add('visible');
  result.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
